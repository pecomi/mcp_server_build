server:
  port: 8090

spring:
  application:
    name: mcp-lab-demo
  web:
    resources:
      static-locations: classpath:/static/

demo:
  host:
    url: ${HOST_URL:http://mcp-lab-host:8085}
  jaeger:
    url: ${JAEGER_URL:http://mcp-lab-jaeger:16686}
  scanner:
    url: ${SCANNER_URL:http://mcp-lab-scanner:8087}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://mcp-lab-otel-collector:4318/v1/traces}

logging:
  level:
    root: INFO
    demo: DEBUG
