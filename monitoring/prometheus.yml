global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'mock-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['mcp-lab-mock-backend:8083']

  - job_name: 'mcp-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['mcp-lab-mcp-server:8080']

  - job_name: 'fs-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['mcp-lab-fs-server:8084']

  - job_name: 'research-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['mcp-lab-research-server:8086']

  - job_name: 'host'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['mcp-lab-host:8085']

  - job_name: 'scanner'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['mcp-lab-scanner:8087']
