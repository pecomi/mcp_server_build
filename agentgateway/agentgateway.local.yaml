binds:
- port: 8081
  listeners:
  - routes:
    - name: mcp-with-api-key
      matches:
      - path:
          pathPrefix: /mcp
        headers:
        - name: x-api-key
          value:
            regex: ".+"
      policies:
        cors:
          allowOrigins:
          - "*"
          allowHeaders:
          - "*"
          exposeHeaders:
          - "Mcp-Session-Id"
      backends:
      - mcp:
          targets:
          - name: eshare-mcp-server
            mcp:
              host: http://mcp-lab-mcp-server:8080/mcp
          - name: fs-server
            mcp:
              host: http://mcp-lab-fs-server:8084/mcp
          - name: research-server
            mcp:
              host: http://mcp-lab-research-server:8086/mcp

    - name: mcp-missing-api-key
      matches:
      - path:
          pathPrefix: /mcp
      policies:
        directResponse:
          status: 401
          body: '{"error":{"code":"MISSING_API_KEY","message":"X-API-Key header is required at gateway."}}'