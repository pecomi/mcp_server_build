binds:
- port: 8081
  listeners:
  - routes:
    - policies:
        cors:
          allowOrigins:
          - "*"
          allowHeaders:
          - "*"
          exposeHeaders:
          - "Mcp-Session-Id"
      backends:
      - mcp:
          targets:
          - name: eshare-mcp-server
            mcp:
              host: http://mcp-lab-mcp-server:8080/mcp