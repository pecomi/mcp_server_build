server:
  port: 8087

spring:
  application:
    name: mcp-lab-scanner

scanner:
  default-target: ${SCANNER_DEFAULT_TARGET:http://mcp-lab-gateway:8081/mcp}
  default-api-key: ${SCANNER_DEFAULT_API_KEY:local-redteam-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://mcp-lab-otel-collector:4318/v1/traces}

logging:
  level:
    root: INFO
    scanner: DEBUG
