server:
  port: 8086

spring:
  application:
    name: research-server

research:
  tool:
    lookup-term:
      description: ${RESEARCH_TOOL_DESC_LOOKUP_TERM:주어진 용어(term)에 대한 사전적 정의를 반환한다.}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://mcp-lab-otel-collector:4318/v1/traces}

logging:
  level:
    root: INFO
    research_server: DEBUG
